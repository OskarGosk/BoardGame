name: Android CI

# When the pipeline should run:
on:
  pull_request:            # every PR (e.g. feature -> master)
  push:
    branches: [ master ]   # direct changes on master
  workflow_dispatch:       # allow manual runs from the Actions tab

jobs:
  # ── Job 1: lint + unit tests + build (fast, no emulator) ──
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Inject secrets
        run: |
          echo "BGG_API_KEY=${{ secrets.BGG_API_KEY }}" >> local.properties
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build APK (debug)
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload test/lint reports (even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/

  # ── Job 2: instrumented tests on an emulator (slow, hence separate) ──
  instrumented-test:
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        # The emulator needs hardware acceleration (KVM) to run at usable speed.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Inject secrets
        run: |
          echo "BGG_API_KEY=${{ secrets.BGG_API_KEY }}" >> local.properties
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
