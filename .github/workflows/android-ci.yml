name: Android CI

# Kiedy pipeline ma się uruchomić:
on:
  pull_request:            # każdy PR (np. feature -> master)
  push:
    branches: [ master ]   # bezpośrednie zmiany na master
  workflow_dispatch:       # możliwość ręcznego odpalenia z zakładki Actions

jobs:
  # ── Job 1: lint + testy jednostkowe + build (szybki, bez emulatora) ──
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Skonfiguruj Gradle (z cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Wstrzyknij sekrety
        run: |
          echo "BGG_API_KEY=${{ secrets.BGG_API_KEY }}" >> local.properties
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Nadaj prawa wykonywania gradlew
        run: chmod +x ./gradlew

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Testy jednostkowe
        run: ./gradlew testDebugUnitTest

      - name: Zbuduj APK (debug)
        run: ./gradlew assembleDebug

      - name: Zapisz APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Zapisz raporty testów/lintu (gdy coś padnie)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/

  # ── Job 2: testy instrumentalne na emulatorze (wolny, dlatego osobno) ──
  instrumented-test:
    runs-on: ubuntu-latest
    # Emulator wymaga akceleracji sprzętowej (KVM) – włączamy ją:
    steps:
      - name: Włącz KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Skonfiguruj Gradle (z cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Wstrzyknij sekrety
        run: |
          echo "BGG_API_KEY=${{ secrets.BGG_API_KEY }}" >> local.properties
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Nadaj prawa wykonywania gradlew
        run: chmod +x ./gradlew

      - name: Uruchom testy instrumentalne na emulatorze
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
